<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Funny HTML Page</title>
   <style>
       body {
           font-family: Arial, sans-serif;
           background-color: #f0f8ff;
           text-align: center;
           margin: 0;
           padding: 20px;
       }
       h1 {
           color: #ff6347;
       }
       p {
           font-size: 1.2em;
       }
       .funny-button {
           background-color: #ff6347;
           color: white;
           border: none;
           padding: 10px 20px;
           font-size: 1em;
           cursor: pointer;
           border-radius: 5px;
       }
       .funny-button:hover {
           background-color: #ff4500;
       }
       img {
           margin-top: 20px;
           width: 300px;
           border-radius: 10px;
       }
   </style>
</head>
<body>
   <h1>Welcome to the Funniest Page on the Internet!</h1>
   <p>Why did the web developer go broke? Because they used up all their <strong>cache</strong>!</p>
   <button class="funny-button" onclick="alert('You clicked me! 😂')">Click Me for a Laugh</button>
   <img src="https://via.placeholder.com/300x200?text=Funny+Image" alt="Funny Placeholder Image">
   <p>Refresh the page for more laughs. Or don’t. I’m just a webpage, not your boss.</p>
</body>
</html>
